name: pyrita_app
description: "Pyrita — приватный клиент VPN-сервиса с одним нажатием."
publish_to: "none"

# package versioning: <semantic>+<build>
# Bump <build> (целое число) каждый Android-release — Play и RuStore
# отказывают APK'у с тем же versionCode что уже опубликован.
version: 0.1.17+28

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management. Riverpod 2.x — type-safe, без BuildContext-зависимости
  # в логике, хорошо тестируется. Альтернатива — Bloc, но он verbose'нее.
  flutter_riverpod: ^2.5.1

  # Routing. go_router — официальный Flutter router, deep-links works,
  # declarative-config. Альтернатива — auto_route, но он code-gen-heavy.
  go_router: ^14.0.0

  # HTTP client. Dio — modern, interceptors, типизация лучше чем http.
  dio: ^5.4.0

  # Secure storage для auth-token / refresh-token. Под капотом:
  # Android Keystore + iOS Keychain. Дороже чем shared_preferences, но
  # безопаснее для creds.
  flutter_secure_storage: ^9.2.0

  # Non-sensitive preferences (theme, last-server). Простой shared_preferences.
  shared_preferences: ^2.2.0

  # SVG assets — logo-mark/lockup лежат в assets/images/ как SVG.
  flutter_svg: ^2.0.0

  # System fonts integration — Manrope + JetBrains Mono. Download-on-demand
  # с Google Fonts CDN — экономит APK size но требует первого online-старта.
  # Для offline-first можно заменить на bundled .ttf — TODO для Phase D.
  google_fonts: ^6.2.0

  # Date/time formatting на русский — ru_RU locale.
  intl: ^0.19.0

  # Url launcher — открывает CryptoCloud pay-page в Chrome Custom Tab
  # (или Safari Tab на iOS позже). Лучше чем WebView — нативный UI,
  # cookies сохраняются, юзер видит лочный padlock-icon.
  url_launcher: ^6.3.0

  # Phase C: real VPN tunnel через Xray-core (MPL-2.0 binary, MIT wrapper).
  # Embeds Xray v26.4.17 для Android — VLESS+Reality / VLESS XHTTP / Hysteria 2.
  # См. ~/.claude/plans/c-phase-vpn-integration.md и
  # pyrita-app/docs/PHASE-C-RESEARCH.md для license-audit и backup wrapper.
  # ВАЖНО: версию НЕ менять без re-audit'а (license-drift risk R6).
  flutter_v2ray_client: ^3.2.0

  # Phase C: auto-reconnect при network change (WiFi ↔ 4G).
  # Listener на connectivity events → restart tunnel.
  # v7.x требует Flutter >=3.19.0 (наш CI ставит 3.41.9 — OK).
  connectivity_plus: ^7.1.1

  # Phase D: runtime permission requests. Android 13+ требует явный
  # POST_NOTIFICATIONS request — иначе VpnService показывает silent
  # foreground service без видимой notification. Юзер не понимает что
  # VPN работает.
  permission_handler: ^11.3.0

  # Phase D: in-app update checker (GitHub Releases). Читает текущую
  # version из pubspec, сравнивает с tag_name latest release'а.
  package_info_plus: ^8.0.0

  # Phase D: open_filex был использован для APK install но silent-fail'ил
  # на Android 14+ Samsung One UI. Заменён на native method channel
  # `com.pyrita.pyrita_app/installer` в MainActivity.kt (см. v0.1.8
  # commit + docs).

  # Phase D: external cache dir для скачанного APK (нужен FileProvider'у).
  path_provider: ^2.1.5

  # Phase D (v0.1.10): кастомная notification поверх plugin's PRIORITY_MIN
  # (Samsung One UI прячет её под generic "приложение выполняется"). Своя
  # с PRIORITY_LOW + title "Pyrita · Хельсинки" + action "Отключить".
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Default Flutter lints — strict, помогает держать стиль.
  flutter_lints: ^4.0.0

  # Генерация Android adaptive launcher-иконок из PNG бренд-пакета.
  # Запуск: `dart run flutter_launcher_icons` (выполняется в CI шаге).
  flutter_launcher_icons: ^0.14.4

# Конфиг flutter_launcher_icons. Финальные иконки из дизайн-системы:
#   * icon-launcher-foreground.png — isometric golden pyrite cube с внутренним
#     свечением (transparent backdrop, safe-zone fit'нут для adaptive icon).
#   * icon-launcher-legacy.png — тот же cube на тёмном #0E0F12 backdrop
#     (full-bleed для Android <8 не-adaptive launcher).
# Источник: Pyrita Design System «Icons» canvas, v0.1.1.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon-launcher-legacy.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0E0F12"
  adaptive_icon_foreground: "assets/images/icon-launcher-foreground.png"
  remove_alpha_ios: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Fonts из Google Fonts подтянутся в runtime. Если решим bundle'ить
  # .ttf — раскомментировать и положить файлы в assets/fonts/.
  # fonts:
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Regular.ttf
  #       - asset: assets/fonts/Manrope-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700
