name: Build Android APK

# Триггеры:
#   * push в main или любую feature-ветку → сборка debug-APK
#   * tag v*.*.* → сборка release-APK (требует SIGNING_* secrets — см. ниже)
#   * manual через "Run workflow" в GitHub Actions UI

on:
  push:
    branches: ["main", "feature/**"]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Если push'ы идут быстро — отменяем in-progress runs одного и того же
# ref'а (commit'а). Экономит GH Actions минуты.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    # Tag-only runs пропускают debug-build (он строится release-job'ом).
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Версия должна матчить pubspec.yaml environment.flutter.
          # При апгрейде Flutter — обновлять оба места одновременно.
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter doctor (info)
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # Генерация Android adaptive launcher-иконок из assets/images/icon-b-pyrite.png.
      # Перезаписывает android/app/src/main/res/mipmap-*/ — должно происходить
      # ДО `flutter create` чтобы platform-scaffolding не перетёр их.
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze

      # `flutter create` нужен для генерации platform-scaffolding (android/
      # gradle файлы, R-классы etc) если они ещё не закоммичены. Безвредно
      # если уже есть — flutter create НЕ перезатирает custom changes
      # в AndroidManifest.xml / MainActivity.kt.
      - name: Ensure platform scaffolding
        run: |
          flutter create . --org com.pyrita --project-name pyrita_app \
            --platforms android --no-pub --no-overwrite || true

      # Phase C: --split-per-abi разделяет универсальный APK на arm64-v8a /
      # armeabi-v7a / x86_64 (debug-build). Каждый ~70-90 МБ вместо ~260 МБ
      # universal-APK (Xray-core .so файлы — 4 ABI × ~50 MB = ~200 MB одних
      # natives). Релевантно для testing-pipeline'а: arm64 APK достаточен
      # для 99% устройств.
      - name: Build debug APK (per-ABI splits)
        run: flutter build apk --debug --split-per-abi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrita-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 14

  build-release:
    name: Build release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    # GITHUB_TOKEN по умолчанию read-only с 2023 года; для создания
    # GitHub Release через softprops/action-gh-release@v2 нужен contents:write.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Тот же шаг что в build-debug — генерируем launcher icons из бренд-PNG.
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Decode keystore
        # SIGNING_KEYSTORE_BASE64 — keystore.jks в base64 (создаётся локально:
        # base64 -i keystore.jks | clip). Хранится в GitHub Secrets.
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Ensure platform scaffolding
        run: |
          flutter create . --org com.pyrita --project-name pyrita_app \
            --platforms android --no-pub --no-overwrite || true

      # Phase C: per-ABI splits для release. RuStore любит универсальный
      # APK, но он у нас ~120 МБ release с Xray-core. Per-ABI даёт ~50 МБ
      # arm64-v8a (мейнстрим), ~45 МБ armeabi-v7a (старые/бюджет), ~55 МБ
      # x86_64 (эмулятор / Chromebook). Releases уйдут все три файла —
      # юзер скачивает соответствующий своей архитектуре.
      - name: Build release APK (per-ABI splits)
        run: flutter build apk --release --split-per-abi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk
          fail_on_unmatched_files: true
