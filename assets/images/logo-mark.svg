<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" aria-label="Pyrita">
  <defs>
    
    <linearGradient id="m-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D58A"></stop>
      <stop offset="100%" stop-color="#C99A3F"></stop>
    </linearGradient>
    <linearGradient id="m-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B6822E"></stop>
      <stop offset="100%" stop-color="#7A5519"></stop>
    </linearGradient>
    <linearGradient id="m-r" x1="0" y1="0" x2="0" y2="1">
