    </filter>
  </defs>

  
  <ellipse cx="48" cy="50" rx="22" ry="14" fill="#E8643A" opacity=".22" filter="url(#m-glow)"></ellipse>

  
  <g stroke="#3A2510" stroke-width="0.9" stroke-linejoin="round">
    
    
