# 8G heap из default'а flutter create нереалистичен для GitHub Actions
# ubuntu-latest runner'а (7 GB RAM на всю VM). 4G + 1G metaspace —
# обычно достаточно для Flutter release-builds.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental caches are flaky on this Windows workspace when Flutter
# plugins are compiled from generated Gradle subprojects.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
